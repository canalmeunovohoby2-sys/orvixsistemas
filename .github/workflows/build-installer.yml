name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - "electron/**"
      - "electron-builder.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-installer.yml"
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    name: Build OrvixSistemasSetup.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app with full logs
        shell: pwsh
        run: |
          Write-Host "== npm run build =="
          npm run build 2>&1 | Tee-Object -FilePath npm-build.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm run build failed with exit code $LASTEXITCODE"
            Write-Host "== npm-build.log =="
            Get-Content npm-build.log -Raw
            exit $LASTEXITCODE
          }

      - name: Ensure Electron build dependencies
        shell: pwsh
        run: |
          Write-Host "== checking Electron dependency setup =="
          if (Test-Path "electron/package.json") {
            Write-Host "electron/package.json found; installing electron directory dependencies"
            npm ci --prefix electron 2>&1 | Tee-Object -FilePath electron-deps.log
            if ($LASTEXITCODE -ne 0) {
              Write-Host "electron directory dependency install failed with exit code $LASTEXITCODE"
              Get-Content electron-deps.log -Raw
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "No electron/package.json found; verifying root Electron packages"
            npm ls electron electron-builder 2>&1 | Tee-Object -FilePath electron-deps.log
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Required Electron packages missing from root install; installing temporary build dependencies"
              npm install --no-save electron electron-builder 2>&1 | Tee-Object -Append -FilePath electron-deps.log
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Temporary Electron dependency install failed with exit code $LASTEXITCODE"
                Get-Content electron-deps.log -Raw
                exit $LASTEXITCODE
              }
            }
          }

      - name: Build Windows installer (NSIS)
        shell: pwsh
        env:
          DEBUG: electron-builder*
        run: |
          Write-Host "== npm run electron:build (DEBUG=electron-builder*) =="
          npm run electron:build 2>&1 | Tee-Object -FilePath electron-builder.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "electron-builder failed with exit code $LASTEXITCODE"
            Write-Host "== electron-builder.log =="
            Get-Content electron-builder.log -Raw
            exit $LASTEXITCODE
          }

      - name: List dist directory after Electron build
        if: always()
        shell: bash
        run: |
          echo "== ls -R dist =="
          if [ -d dist ]; then
            ls -R dist
          else
            echo "dist NOT FOUND"
          fi
        env:
          # Sem code signing por enquanto — descomente e configure secrets
          # (CSC_LINK / CSC_KEY_PASSWORD) quando o certificado Authenticode
          # for adquirido.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List every project file before artifact upload
        if: always()
        shell: bash
        run: |
          echo "== pwd =="
          pwd
          echo "== ls -la =="
          ls -la
          echo "== ls -R =="
          ls -R

      - name: List build output
        if: always()
        shell: pwsh
        run: |
          Write-Host "== working directory =="
          Get-Location
          Write-Host "== top-level =="
          Get-ChildItem | Select-Object Name, Mode, Length
          foreach ($dir in @('dist-electron','dist','build','out')) {
            Write-Host "== $dir =="
            if (Test-Path $dir) { Get-ChildItem -Recurse $dir | Select-Object FullName, Length } else { Write-Host "$dir NOT FOUND" }
          }
          Write-Host "== ALL .exe files in repo =="
          Get-ChildItem -Recurse -Filter *.exe -ErrorAction SilentlyContinue | Select-Object FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrvixSistemasSetup
          path: |
            **/*Setup*.exe
            dist/**/*.exe
            dist-electron/**/*.exe
            build/**/*.exe
            out/**/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload full build output (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-debug
          path: |
            npm-build.log
            electron-deps.log
            electron-builder.log
            dist-electron/
            dist/
            build/
            out/
          retention-days: 7

      - name: Attach installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*Setup*.exe
            dist/**/*.exe
            dist-electron/**/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}