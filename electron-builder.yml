appId: com.orvixsistemas.app
productName: ORVIX Sistemas
artifactName: OrvixSistemasSetup.${ext}

directories:
  output: dist-installer
  buildResources: electron/assets

files:
  - from: .
    filter:
      - package.json
      - electron/**/*

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ORVIX Sistemas
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  uninstallDisplayName: ORVIX Sistemas